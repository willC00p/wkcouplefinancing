services:
  - type: web
    name: couple-finance-tracker-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://couple-finance-tracker.onrender.com
    healthCheckPath: /api/health
    autoDeployOnPush: true
    
  - type: static
    name: couple-finance-tracker-web
    region: oregon
    plan: free
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/build
    autoDeployOnPush: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://couple-finance-tracker-api.onrender.com
